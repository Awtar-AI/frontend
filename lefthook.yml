# Lefthook — Git hooks for Awtar Frontend
# Runs: lefthook install (or pnpm exec lefthook install) 

pre-commit:
  parallel: true
  commands:
    format:
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
    lint:
      run: pnpm exec biome lint --no-errors-on-unmatched {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit $1

pre-push:
  commands:
    check:
      run: pnpm exec biome check .
    types:
      run: pnpm run check:types